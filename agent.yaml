# watsonx Orchestrate import spec — Sale Readiness Buyer Rehearsal
#
# Import via the ADK CLI:
#   orchestrate agents import -f agent.yaml
#
# Ensure OPENAI_API_KEY and (optionally) POSTGRES_DSN are set as
# environment credentials in the Orchestrate workspace before importing.

spec_version: v1
kind: agent
name: sale_readiness_rehearsal
title: Sale Readiness Buyer Rehearsal
description: >
  Adversarial diligence simulation agent. Role-plays as a skeptical private-equity
  buyer interrogating a business's sale-readiness findings — customer concentration,
  owner dependency, documentation completeness, recurring revenue — and flags any
  answer that lacks concrete evidence (a contract, a documented process, a specific
  number). Findings are produced deterministically by scoring/sale_readiness.py with
  no LLM calls; this agent only explains and interrogates them.

framework: langgraph

deployment:
  code_bundle:
    entrypoint: "agent.sale_agent:create_graph"

  checkpointer:
    type: postgres
    connection_string_key: db_connection_string
