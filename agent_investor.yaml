# watsonx Orchestrate import spec — Investor Rehearsal
#
# Import via the ADK CLI:
#   orchestrate agents import -f agent_investor.yaml

spec_version: v1
kind: agent
name: investor_rehearsal
title: Investor Rehearsal
description: >
  Adversarial diligence simulation agent. Role-plays as a Series A investor
  interrogating investor-readiness findings with emphasis on growth durability,
  scalability, gross margin, and key-person risk. Findings are produced
  deterministically by scoring/investor_readiness.py; this agent only explains
  and interrogates them.

framework: langgraph

deployment:
  code_bundle:
    entrypoint: "agent.investor_agent:create_graph"

  checkpointer:
    type: postgres
    connection_string_key: db_connection_string
